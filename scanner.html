<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Minimal QR Scanner Demo</title>
<style>
  body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; margin: 0; padding: 16px; background: #f7f7fb; color: #111; }
  h1 { font-size: 18px; margin: 0 0 12px; }
  .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 12px; max-width: 520px; margin: 0 auto; }
  .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin: 8px 0; }
  button { padding: 10px 14px; border: 0; border-radius: 10px; font-weight: 700; cursor: pointer; }
  .start { background: #0d6efd; color: #fff; }
  .stop { background: #dc3545; color: #fff; }
  select, input { padding: 10px 12px; border: 1px solid #e5e7eb; border-radius: 10px; outline: none; }
  #readerWrap { position: relative; width: 100%; max-width: 480px; height: 320px; margin: 8px auto; border: 1px solid #e5e7eb; border-radius: 12px; overflow: hidden; }
  #reader { position: absolute; inset: 0; }
  #status { font-size: 13px; color: #555; }
  #last { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 14px; background: #f3f4f6; padding: 10px; border-radius: 10px; word-break: break-all; }
  .hint { font-size: 12px; color: #666; }
</style>
</head>
<body>
  <div class="card">
    <h1>QR Scanner Sample</h1>
    <div class="row">
      <button class="start" id="btnStart">Start Camera</button>
      <button class="stop" id="btnStop" disabled>Stop</button>
      <label>Camera:
        <select id="cameraSelect"></select>
      </label>
      <label>Beep <input type="checkbox" id="chkBeep" checked></label>
    </div>
    <div id="readerWrap">
      <div id="reader"></div>
    </div>
    <div class="row">
      <div id="status">Idle. Open this over <strong>HTTPS</strong> or <strong>localhost</strong> so the camera works.</div>
    </div>
    <div class="row">
      <label style="flex:1">Auto-fill target
        <input id="target" placeholder="#sku or leave blank to just display">
      </label>
    </div>
    <div class="row">
      <div style="flex:1">
        <div class="hint">Last result</div>
        <div id="last">—</div>
      </div>
    </div>
  </div>

  <!-- Tiny beep (440Hz ~100ms) -->
  <audio id="beep">
    <source src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAESsAACJWAAACABAAZGF0YQwAAAAA////f39/f39/f39/f39/f39/f39/f39/f39/f39/f39/f39/f39/f39/f39/f39/f3///8=" type="audio/wav">
  </audio>

  <!-- html5-qrcode -->
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script>
    (function(){
      const $ = (s, r=document)=>r.querySelector(s);
      const btnStart = $("#btnStart");
      const btnStop  = $("#btnStop");
      const selCam   = $("#cameraSelect");
      const chkBeep  = $("#chkBeep");
      const statusEl = $("#status");
      const lastEl   = $("#last");
      const targetEl = $("#target");

      let qr = null;
      let currentCameraId = null;

      function setStatus(msg){ statusEl.textContent = msg; }

      async function listCameras(){
        try{
          const devices = await Html5Qrcode.getCameras();
          selCam.innerHTML = devices.map(d=>`<option value="\${d.id}">\${d.label||'Camera'}</option>`).join("");
          if(devices.length && !currentCameraId){
            currentCameraId = devices[0].id;
          }
          selCam.value = currentCameraId || "";
        }catch(e){
          console.error(e);
          setStatus("Unable to list cameras. Use HTTPS/localhost and allow camera permission.");
        }
      }

      async function start(){
        try{
          await stop(); // ensure clean start
          if(!qr){
            qr = new Html5Qrcode("reader", {
              formatsToSupport: [ Html5QrcodeSupportedFormats.QR_CODE ],
              verbose: false
            });
          }
          const camId = selCam.value || currentCameraId || undefined;
          setStatus("Opening camera…");
          await qr.start(
            camId ? { deviceId: { exact: camId } } : { facingMode: "environment" },
            { fps: 15, qrbox: { width: 260, height: 260 }, aspectRatio: 1.0 },
            onScan,
            onScanFail
          );
          btnStart.disabled = true;
          btnStop.disabled = false;
          setStatus("Camera active — align the QR inside the square.");
        }catch(e){
          console.error(e);
          setStatus("Camera error. Tip: open over HTTPS/localhost and allow permission.");
          btnStart.disabled = false;
          btnStop.disabled = true;
        }
      }

      async function stop(){
        try{
          if(qr){
            await qr.stop();
            await qr.clear();
          }
        }catch(e){};
        $("#reader").innerHTML = "";
        btnStart.disabled = false;
        btnStop.disabled = true;
        setStatus("Stopped.");
      }

      function onScan(text){
        lastEl.textContent = text;
        if(chkBeep.checked){ try{ $("#beep").currentTime = 0; $("#beep").play(); }catch(e){} }
        // If a target selector is provided, put the text there and fire events
        const sel = (targetEl.value||"").trim();
        if(sel){
          const el = document.querySelector(sel);
          if(el){
            el.value = text;
            el.dispatchEvent(new Event('input', {bubbles:true}));
            el.dispatchEvent(new Event('change', {bubbles:true}));
          }
        }
      }
      function onScanFail(_) { /* ignore decoding failures to keep scanning */ }

      btnStart.addEventListener("click", start);
      btnStop.addEventListener("click", stop);
      selCam.addEventListener("change", ()=>{ currentCameraId = selCam.value; });

      // Prime camera list on load
      window.addEventListener("load", listCameras);
    })();
  </script>
</body>
</html>
