<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Drive Upload · Minimal Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { font-family: system-ui, sans-serif; padding: 16px; }
    .row { margin: 12px 0; }
    input[type=file]{ max-width:100%;}
    button { padding: 8px 14px; }
    #out div { margin: 6px 0; }
  </style>
  <!-- Google Identity Services (OAuth token flow) -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <!-- Google API client -->
  <script src="https://apis.google.com/js/api.js" async defer></script>
</head>
<body>
  <h2>Upload to Google Drive (camera or file)</h2>

  <div class="row">
    <label>Pick or take a photo:</label><br>
    <input id="file" type="file" accept="image/*" capture="environment">
  </div>

  <div class="row">
    <button id="auth" disabled>Authorize</button>
    <button id="upload" disabled>Upload to Drive</button>
  </div>

  <div id="out" class="row"></div>

  <script>
    // ==== YOUR KEYS (ok to be public in front-end) ====
    const CLIENT_ID = '498416046472-eolm8kdn1b4m85j7kmore5h81g5p8ul6.apps.googleusercontent.com';
    const API_KEY   = 'AIzaSyD__pdagN23rYDiaV914fvuUeulNkZUzwc';

    // Scopes: drive.file lets your app create/manage files it made/selected
    const SCOPES    = 'https://www.googleapis.com/auth/drive.file';
    const DISCOVERY = 'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest';

    const $ = s => document.querySelector(s);
    const out = $('#out');
    let tokenClient, gapiReady = false, gisReady = false;

    // Wait for both libraries, then enable the Authorize button
    const readyTick = setInterval(()=>{
      if (window.gapi?.load && !gapiReady) {
        gapi.load('client', async ()=>{
          await gapi.client.init({ apiKey: API_KEY, discoveryDocs:[DISCOVERY] });
          gapiReady = true; maybeEnable();
        });
      }
      if (window.google?.accounts?.oauth2 && !gisReady) {
        tokenClient = google.accounts.oauth2.initTokenClient({
          client_id: CLIENT_ID, scope: SCOPES, callback: () => {}
        });
        gisReady = true; maybeEnable();
      }
      if (gapiReady && gisReady) clearInterval(readyTick);
    }, 150);

    function maybeEnable(){
      if (gapiReady && gisReady) $('#auth').disabled = false;
    }

    $('#auth').addEventListener('click', () => {
      tokenClient.callback = (resp) => {
        if (resp.error) { console.error(resp); alert('Auth failed'); return; }
        log('Authorized ✓');
        $('#upload').disabled = false;
      };
      if (!gapi.client.getToken()) tokenClient.requestAccessToken({ prompt: 'consent' });
      else tokenClient.requestAccessToken({ prompt: '' });
    });

    $('#upload').addEventListener('click', async ()=>{
      const file = $('#file').files?.[0];
      if (!file) return alert('Pick or take a photo first.');
      try {
        const res = await uploadToDrive(file /*, 'YOUR_FOLDER_ID' */);
        log(`Uploaded: <a href="${res.viewUrl}" target="_blank" rel="noopener">${res.name}</a>`);
        log(`<small>Store this in Firestore: <code>${res.viewUrl}</code></small>`);
      } catch (e) {
        console.error(e); alert('Upload error (see console).');
      }
    });

    // Create file in Drive, set "anyone with link" to reader, return a clean view URL
    async function uploadToDrive(file, folderId){
      const token = gapi.client.getToken().access_token;
      const meta = { name: file.name, mimeType: file.type };
      if (folderId) meta.parents = [folderId];

      // multipart/related upload with base64 body
      const boundary = '-------314159265358979323846';
      const delimiter = `\r\n--${boundary}\r\n`;
      const closeDelim = `\r\n--${boundary}--`;

      const buf = await file.arrayBuffer();
      let binary = ''; new Uint8Array(buf).forEach(b=> binary += String.fromCharCode(b));
      const base64Data = btoa(binary);

      const body = 
        delimiter + 'Content-Type: application/json; charset=UTF-8\r\n\r\n' +
        JSON.stringify(meta) +
        delimiter + 'Content-Type: ' + file.type + '\r\n' +
        'Content-Transfer-Encoding: base64\r\n\r\n' +
        base64Data + closeDelim;

      const create = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name', {
        method: 'POST',
        headers: { 'Authorization':'Bearer ' + token, 'Content-Type':'multipart/related; boundary=' + boundary },
        body
      });
      const f = await create.json();
      if (!f.id) throw new Error('Upload failed: ' + JSON.stringify(f));

      // Make shareable by link
      await fetch(`https://www.googleapis.com/drive/v3/files/${f.id}/permissions`, {
        method: 'POST',
        headers: { 'Authorization':'Bearer ' + token, 'Content-Type':'application/json' },
        body: JSON.stringify({ role: 'reader', type: 'anyone' })
      });

      return {
        id: f.id,
        name: f.name,
        viewUrl: `https://drive.google.com/file/d/${f.id}/view?usp=sharing`
      };
    }

    function log(html){ const d=document.createElement('div'); d.innerHTML=html; out.appendChild(d); }
  </script>
</body>
</html>
