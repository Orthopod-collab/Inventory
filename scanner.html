<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Orders — Minimal Inline Edit Demo</title>
<style>
  :root{--bg:#f7f7fb;--card:#fff;--border:#e5e7eb;--muted:#6b7280;--brand:#0d6efd;}
  body{margin:0;background:var(--bg);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;color:#111}
  .container{max-width:1100px;margin:24px auto;padding:0 16px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px}
  h1{margin:0 0 12px;font-size:20px}
  label{font-weight:700;display:block;margin:10px 0 4px}
  input[type="text"],input[type="number"]{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:10px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .hint{color:var(--muted);font-size:12px}
  table{width:100%;border-collapse:collapse}
  th,td{border:1px solid var(--border);padding:8px;text-align:left}
  thead th{background:#f3f4f6}
  td input.edit{width:100%;box-sizing:border-box;padding:6px 8px;border:1px solid var(--border);border-radius:8px;font:inherit}
  .pill{display:inline-block;padding:4px 10px;border-radius:999px;background:#eef2ff;color:#3730a3;font-weight:800}
</style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Place / Log an Order</h1>
      <div class="grid">
        <div>
          <label>Scan here (keyboard-wedge)</label>
          <input id="scanBox" type="text" placeholder='Scan JSON or SKU e.g. {"sku":"214.842"}'>
          <div class="hint">Scans auto-save. JSON is reduced to just SKU.</div>
        </div>
        <div>
          <label>Quantity (auto-cumulative)</label>
          <input id="qtyDisplay" type="number" value="—" disabled>
          <div class="hint">Displays last saved quantity for this SKU today.</div>
        </div>
      </div>
    </div>

    <div class="card" style="margin-top:16px">
      <h1>Recent Orders</h1>
      <table>
        <thead>
          <tr>
            <th>When</th><th>Supplier</th><th>Product</th><th>Reference</th><th>Qty</th><th class="po">PO</th><th class="notes">Notes</th>
          </tr>
        </thead>
        <tbody id="ordersBody"></tbody>
      </table>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
    import { getFirestore, collection, query, where, orderBy, limit, onSnapshot, getDocs, addDoc, updateDoc, doc, serverTimestamp, increment } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

    // --- Your inventory project config ---
    const firebaseConfig = {
      apiKey: "AIzaSyB0w25u3Ys1SyE2Xm0waLHNlUcqOKbQdIw",
      authDomain: "inventory-67ceb.firebaseapp.com",
      projectId: "inventory-67ceb",
      storageBucket: "inventory-67ceb.appspot.com",
      messagingSenderId: "1031351285804",
      appId: "1:1031351285804:web:cee68e7047fc8ef76c7989",
      measurementId: "G-C5G29GW4PZ"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // --- Helpers ---
    const $ = (s)=>document.querySelector(s);
    const scanBox = $("#scanBox");
    const qtyDisplay = $("#qtyDisplay");
    function extractSku(text){
      if(!text) return null;
      const t = text.trim();
      if(t.startsWith("{")){ try{ const o = JSON.parse(t); return o.sku || o.SKU || o.code || null; }catch{} }
      const m = t.match(/"sku"\s*:\s*"([^"]+)"/i); if(m) return m[1];
      const m2 = t.match(/[A-Z0-9._\-\/]{3,}/i); return m2 ? m2[0] : null;
    }
    function isSameDay(a,b){ const da=new Date(a), db2=new Date(b); return da.getFullYear()===db2.getFullYear() && da.getMonth()===db2.getMonth() && da.getDate()===db2.getDate(); }

    async function upsertOrderBySku(sku, meta){
      const q = query(collection(db, "orders"), where("sku","==",sku), orderBy("createdAt","desc"), limit(1));
      const snap = await getDocs(q);
      let existing = null; snap.forEach(d=> existing = { id:d.id, ...d.data() });
      const now = new Date();
      if(existing && existing.createdAt && existing.createdAt.toDate && isSameDay(existing.createdAt.toDate(), now)){
        await updateDoc(doc(db, "orders", existing.id), { qty: increment(1), updatedAt: serverTimestamp() });
        return { id: existing.id, qty: (existing.qty||1)+1 };
      }else{
        const payload = {
          sku,
          supplier: meta?.supplier || meta?.sup || "",
          productName: meta?.productName || meta?.name || "",
          qty: 1,
          createdAt: serverTimestamp()
        };
        const ref = await addDoc(collection(db, "orders"), payload);
        return { id: ref.id, qty: 1 };
      }
    }

    function mountRecentOrders(){
      const body = $("#ordersBody");
      const q = query(collection(db, "orders"), orderBy("createdAt","desc"), limit(100));
      onSnapshot(q, (snap)=>{
        body.innerHTML = "";
        snap.forEach(d=>{
          const x = d.data();
          const when = x.createdAt && x.createdAt.toDate ? x.createdAt.toDate() : new Date();
          const tr = document.createElement("tr");
          tr.innerHTML = \`
            <td>\${when.toLocaleString()}</td>
            <td>\${x.supplier||""}</td>
            <td>\${x.productName||""}</td>
            <td>\${x.sku||""}</td>
            <td>\${x.qty??1}</td>
            <td><input class="edit" data-id="\${d.id}" data-field="poNumber" value="\${x.poNumber ?? ""}" placeholder="PO #"></td>
            <td><input class="edit" data-id="\${d.id}" data-field="notes" value="\${x.notes ?? ""}" placeholder="Notes"></td>
          \`;
          body.appendChild(tr);
        });
      });

      body.addEventListener("input", async (e)=>{
        const t = e.target;
        if(!t.classList.contains("edit")) return;
        const id = t.dataset.id, field = t.dataset.field, val = t.value;
        try{
          await updateDoc(doc(db, "orders", id), { [field]: val });
          t.style.borderColor = "#34d399";
          setTimeout(()=> t.style.borderColor = "#e5e7eb", 600);
        }catch(err){
          console.error(err);
          t.style.borderColor = "#ef4444";
        }
      });
    }

    async function handleScanChange(){
      const raw = scanBox.value;
      const sku = extractSku(raw);
      if(!sku) return;
      // Clean the box so users don't see JSON
      if(raw !== sku) scanBox.value = sku;
      try{
        const res = await upsertOrderBySku(sku, null);
        qtyDisplay.value = res.qty;
      }catch(err){ console.error("Upsert failed", err); }
    }

    // Wire wedge box
    scanBox.addEventListener("input", handleScanChange);
    scanBox.addEventListener("change", handleScanChange);

    // Sign in anon then mount listeners
    onAuthStateChanged(auth, (user)=>{
      if(user) mountRecentOrders();
    });
    signInAnonymously(auth).catch(console.error);
  </script>
</body>
</html>
