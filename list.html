<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Product List</title>
  <style>
    table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    img { width: 50px; }
  </style>
</head>
<body>
  <h2>Inventory List</h2>
  <input type="text" id="search" placeholder="Search by name, supplier or category" />
  <table id="productTable">
    <thead>
      <tr><th>Image</th><th>Name</th><th>Ref</th><th>Supplier</th><th>Category</th><th>Qty</th></tr>
    </thead>
    <tbody></tbody>
  </table>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    const firebaseConfig = {
      apiKey: "AIzaSyCOwLEv21k5i63laJF86qGOBMoucJMp4Gw",
      authDomain: "skills-vault.firebaseapp.com",
      projectId: "skills-vault"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const tableBody = document.querySelector("#productTable tbody");
    async function loadProducts() {
      const snapshot = await getDocs(collection(db, "inventory"));
      tableBody.innerHTML = "";
      snapshot.forEach(doc => {
        const p = doc.data();
        tableBody.innerHTML += `
          <tr>
            <td>${p.imageUrl ? `<img src="${p.imageUrl}"/>` : ''}</td>
            <td>${p.name}</td>
            <td>${p.ref}</td>
            <td>${p.supplier}</td>
            <td>${p.category}</td>
            <td>${p.quantity}</td>
          </tr>`;
      });
    }
    document.getElementById("search").addEventListener("input", () => {
      const val = document.getElementById("search").value.toLowerCase();
      [...tableBody.rows].forEach(row => {
        row.style.display = [...row.cells].some(cell =>
          cell.textContent.toLowerCase().includes(val)
        ) ? "" : "none";
      });
    });
    loadProducts();
  </script>
</body>
</html>
