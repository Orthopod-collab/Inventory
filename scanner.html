<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>OrthoPod Scanner</title>
<style>
  :root{ --bg:#0b0f14; --panel:#0f1720; --border:#223042; --text:#e5eef9; --muted:#9fb2c7; --accent:#4ea3ff; --ok:#19c37d; --warn:#ff5e57; }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial}
  header{padding:20px 16px;background:var(--panel);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
  h1{margin:0;font-size:22px;letter-spacing:.3px;text-align:center}
  main{padding:18px;display:grid;gap:16px;max-width:560px;margin:0 auto}
  .stack{display:grid;gap:14px}
  .btn{appearance:none;border:1px solid var(--border);background:#142034;color:var(--text);padding:16px;border-radius:14px;font-weight:900;cursor:pointer;font-size:18px}
  .btn.primary{background:var(--accent);border-color:transparent;color:#071423}
  .btn.ok{background:#12261c;border-color:#1e3a2f;color:#7ff0bb}
  .btn.warn{background:#2a1520;border-color:#57233a;color:#ff6b8b}
  .center{display:grid;gap:14px}
  .hidden{display:none !important}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:14px}
  #view{position:relative;border:1px solid var(--border);border-radius:12px;overflow:hidden;background:#000}
  video{display:block;width:100%;max-height:62vh}
  #overlay{position:absolute;inset:0;pointer-events:none}
  #overlay:after{content:'';position:absolute;inset:8% 10%;border:2px solid rgba(255,255,255,0.9);border-radius:12px;box-shadow:0 0 0 9999px rgba(0,0,0,.35) inset}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .pill{font-size:12px;padding:6px 10px;border:1px solid var(--border);border-radius:999px;color:var(--muted)}
  .toggle{display:flex;align-items:center;gap:8px}
  .switch{position:relative;width:52px;height:30px;border-radius:999px;background:#223042;border:1px solid #2b3d52;cursor:pointer}
  .switch input{opacity:0;width:0;height:0}
  .knob{position:absolute;top:3px;left:3px;width:24px;height:24px;background:#fff;border-radius:50%;transition:transform .2s}
  .switch input:checked + .knob{transform:translateX(22px)}
  @media (min-width:700px){ .btn{font-size:20px} }
</style>
</head>
<body>
<header><h1>OrthoPod Scanner</h1></header>

<main>
  <!-- Home screen -->
  <section id="home" class="stack">
    <button class="btn" id="btnOrder">Order</button>
    <button class="btn ok" id="btnReceive">Receive</button>
    <button class="btn warn" id="btnUse">Use</button>
  </section>

  <!-- Scanner screen -->
  <section id="scan" class="hidden">
    <div class="card stack">
      <div class="row" style="justify-content:space-between">
        <div class="row">
          <select id="camera" style="background:#0a131f;color:#fff;border:1px solid var(--border);border-radius:10px;padding:8px 10px"></select>
          <button id="back" class="btn">Back</button>
        </div>
        <div class="row">
          <div class="toggle">
            <label class="switch">
              <input id="continuous" type="checkbox" checked><span class="knob"></span>
            </label>
            <span class="pill">Continuous</span>
          </div>
          <button id="torch" class="btn">Torch</button>
          <span id="status" class="pill">Starting…</span>
        </div>
      </div>
      <div id="view">
        <video id="video" playsinline autoplay muted webkit-playsinline></video>
        <canvas id="canvas" class="hidden"></canvas>
        <div id="overlay"></div>
      </div>
    </div>
  </section>
</main>

<script>
  // Config — point this to your hosted app URL when deployed.
  // The scanner will open your app and switch tabs using hash params:
  //  - #tab=orders&scan=...   (Order)
  //  - #tab=received&scan=... (Receive)
  //  - #tab=inventory&scan=... (Use)
  const APP_URL = './tester1_supplier_context.html';

  // Lightweight jsQR fallback
  let jsQRReady=false;
  function ensureJsQR(){
    return new Promise((resolve)=>{
      if (window.jsQR){ jsQRReady=true; return resolve(true); }
      const s=document.createElement('script');
      s.src='https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js';
      s.onload=()=>{ jsQRReady=true; resolve(true); };
      s.onerror=()=>resolve(false);
      document.head.appendChild(s);
    });
  }

  // UI
  const $ = s => document.querySelector(s);
  const home = $('#home');
  const scan = $('#scan');
  const btnOrder = $('#btnOrder');
  const btnReceive = $('#btnReceive');
  const btnUse = $('#btnUse');
  const btnBack = $('#back');
  const camSel = $('#camera');
  const statusEl = $('#status');
  const torchBtn = $('#torch');
  const chkCont = $('#continuous');
  const video = $('#video');
  const canvas = $('#canvas');
  const ctx = canvas.getContext('2d');

  let mode='order'; // 'order' | 'receive' | 'use'
  let stream=null, track=null, scanning=false, detector=null, useBD=('BarcodeDetector' in window);
  let lastText=null;

  function showHome(){ home.classList.remove('hidden'); scan.classList.add('hidden'); }
  function showScan(){ home.classList.add('hidden'); scan.classList.remove('hidden'); }

  function setStatus(t){ statusEl.textContent=t; }

  async function listCameras(){
    try{
      const devs = await navigator.mediaDevices.enumerateDevices();
      const vids = devs.filter(d=>d.kind==='videoinput');
      camSel.innerHTML = vids.map(d=>`<option value="${d.deviceId}">${d.label || 'Camera '+(vids.indexOf(d)+1)}</option>`).join('');
    }catch{}
  }

  async function startCamera(){
    try{
      const constraints = {
        video: {
          facingMode: { ideal: 'environment' },
          advanced: [{ facingMode: 'environment' }],
          deviceId: camSel.value ? { exact: camSel.value } : undefined,
          width: { ideal: 1280 }, height: { ideal: 720 }
        }, audio: false
      };
      stream = await navigator.mediaDevices.getUserMedia(constraints);
      video.srcObject = stream;
      await video.play();
      track = stream.getVideoTracks()[0];
      torchBtn.disabled = !track.getCapabilities || !track.getCapabilities().torch;
      scanning = true; setStatus('Scanning…');
      if(useBD){
        try{ detector = new BarcodeDetector({formats:['qr_code']}); }catch{ useBD=false; }
      }
      requestAnimationFrame(loop);
      await listCameras();
    }catch(err){
      console.error(err);
      setStatus('Camera blocked — use HTTPS and allow permission.');
      alert('Camera access failed. Use HTTPS (or localhost) and allow camera permission.');
    }
  }

  async function stopCamera(){
    scanning=false;
    if(track){ try{ track.stop(); }catch{} }
    if(stream){ stream.getTracks().forEach(t=>t.stop()); }
    stream=null; track=null; detector=null;
  }

  async function decodeFrame(){
    const w = video.videoWidth, h = video.videoHeight;
    if(!w || !h) return null;
    canvas.width = w; canvas.height = h;
    ctx.drawImage(video, 0, 0, w, h);

    if(useBD && detector){
      try{
        const bmp = await createImageBitmap(canvas);
        const codes = await detector.detect(bmp);
        if(codes && codes.length) return codes[0].rawValue;
      }catch{ /* fallback */ }
    }
    if(!(await ensureJsQR())) return null;
    const data = ctx.getImageData(0,0,canvas.width,canvas.height);
    const qr = window.jsQR(data.data, data.width, data.height);
    return qr?.data || null;
  }

  async function loop(){
    if(!scanning) return;
    const txt = await decodeFrame();
    if(txt && txt !== lastText){
      lastText = txt;
      setStatus('Decoded');
      await onDecoded(txt);
      if(!chkCont.checked){
        await stopCamera();
        showHome();
        return;
      } else {
        setTimeout(()=>setStatus('Scanning…'), 300);
      }
    }
    requestAnimationFrame(loop);
  }

  function openInApp(payload){
    const tab = mode==='order' ? 'orders' : (mode==='receive' ? 'received' : 'inventory');
    const url = APP_URL + '#tab=' + encodeURIComponent(tab) + '&scan=' + encodeURIComponent(payload);
    window.location.href = url;
  }

  async function onDecoded(text){
    openInApp(text);
  }

  // Event wiring
  btnOrder.addEventListener('click', async ()=>{ mode='order'; showScan(); await startCamera(); });
  btnReceive.addEventListener('click', async ()=>{ mode='receive'; showScan(); await startCamera(); });
  btnUse.addEventListener('click', async ()=>{ mode='use'; showScan(); await startCamera(); });
  btnBack.addEventListener('click', async ()=>{ await stopCamera(); showHome(); });
  camSel.addEventListener('change', async ()=>{ if(stream){ await stopCamera(); await startCamera(); } });
  torchBtn.addEventListener('click', async ()=>{
    if(!track?.getCapabilities) return;
    const caps = track.getCapabilities(); if(!caps.torch) return;
    const settings = track.getSettings();
    const next = !settings.torch;
    try{ await track.applyConstraints({ advanced: [{ torch: next }] }); }catch{}
  });

  // First paint shows home with 3 buttons; nothing else
</script>
</body>
</html>
